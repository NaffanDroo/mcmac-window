name: Lint PR Title

# Enforces Conventional Commits format on PR titles.
# GitHub uses the PR title as the squash-merge commit message, so this
# ensures the main-branch history stays machine-readable for release-please.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types that map to changelog sections in release-please-config.json.
          # Must stay in sync with the type list in CONTRIBUTING.md and
          # scripts/check-commit-msg.sh.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            chore
            ci
            build
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title must start with a lowercase letter.
            Example: "feat: add top-right quarter snap"
