name: Coverage

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Code Coverage
    runs-on: macos-15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run tests with coverage
        run: swift test --enable-code-coverage --skip WindowMoverTests

      - name: Generate coverage report
        id: coverage
        run: |
          BIN_PATH="$(swift build --show-bin-path)"
          PROFDATA="$(find .build -name default.profdata -type f | head -1)"
          TEST_BIN="$BIN_PATH/McMacWindowPackageTests.xctest/Contents/MacOS/McMacWindowPackageTests"

          # Exclude test files, build artefacts, and UI/system code that
          # requires a running app (AppDelegate, AppDelegatePanels).
          EXCLUDE='\.build|Tests/|AppDelegate|AppDelegatePanels'

          # JSON export for parsing
          xcrun llvm-cov export "$TEST_BIN" \
            -instr-profile="$PROFDATA" \
            -ignore-filename-regex="$EXCLUDE" \
            -format=text > coverage.json

          # Human-readable report
          REPORT=$(xcrun llvm-cov report "$TEST_BIN" \
            -instr-profile="$PROFDATA" \
            -ignore-filename-regex="$EXCLUDE")

          # Extract total line coverage percentage
          TOTAL=$(echo "$REPORT" | tail -1 | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+\.[0-9]+%$/) last=$i} END{print last}')

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Build the markdown comment body
          {
            echo "## Code Coverage Report"
            echo ""
            echo "**Total line coverage: $TOTAL**"
            echo ""
            echo '```'
            echo "$REPORT"
            echo '```'
            echo ""
            echo "_Generated by CI — covers source files only (excludes tests and build artefacts)._"
          } > coverage-comment.md

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2
        with:
          path: coverage-comment.md
