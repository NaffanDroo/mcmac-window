name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  DMG_NAME: mcmac-window.dmg

# The release-please library does two things in one call:
#   1. Process any merged release PR → create GitHub release + git tag
#   2. Scan commits since the latest release → create/update the next release PR
#
# These two steps must NOT share a single job. Step 1 creates the GitHub release
# via the API; step 2 immediately queries the API for "latest release" to compute
# the changelog baseline. GitHub's API has a brief propagation delay (~2 s), so
# step 2 sees no releases and falls back to scanning all commits from the
# beginning — producing a bloated changelog PR.
#
# Fix: three sequential jobs.
#   create-release  → only creates the GitHub release + tag (skip-github-pull-request)
#   attach-and-publish → attaches the DMG to the draft release and publishes it
#   update-release-pr → only creates/updates the next release PR (skip-github-release)
#
# By the time update-release-pr runs (~60 s after create-release), GitHub's API
# has propagated the new release and the correct baseline is found.

jobs:

  # Job 1: Process any merged release PR and create the GitHub draft release + tag.
  # Intentionally does NOT update the next release PR (skip-github-pull-request).
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Get Token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.get_workflow_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  # Job 2: Download the CI-built DMG, attach it to the draft release, publish.
  # Only runs when a release PR was just merged (release_created == true).
  attach-and-publish:
    name: Attach DMG & Publish Release
    needs: create-release
    if: ${{ needs.create-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: dmg
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach DMG to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag_name }}"
          VERSIONED="mcmac-window-${TAG}.dmg"
          mv "${{ env.DMG_NAME }}" "${VERSIONED}"
          gh release upload "${TAG}" "${VERSIONED}" \
            --repo "${{ github.repository }}"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"

  # Job 3: Create or update the next release PR.
  # Runs after attach-and-publish (or after create-release when no release was
  # created). By this point the new GitHub release has been published for ~60 s
  # and is fully visible to the GitHub API, so the correct commit baseline is used.
  # skip-github-release: true prevents a second release from being created — the
  # tag already exists from job 1, and release-please's state machine is satisfied.
  update-release-pr:
    name: Update Release PR
    needs: [create-release, attach-and-publish]
    if: ${{ always() && needs.create-release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.get_workflow_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
