name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  DMG_NAME: mcmac-window.dmg

jobs:

  # Updates the release PR (and detects when one has been merged).
  # skip-github-release: true means release-please does NOT create the GitHub
  # release or git tag here — attach-and-publish does both atomically once the
  # DMG is ready, so the release is never publicly visible without an asset.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Get Token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.get_workflow_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  # Downloads the CI-built DMG, creates the git tag, then creates the GitHub
  # release with the DMG already attached — one atomic step so the release is
  # never visible to users without an asset (immutable release guarantee).
  attach-and-publish:
    name: Create Release & Attach DMG
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: dmg
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release with DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSIONED="mcmac-window-${TAG}.dmg"
          mv "${{ env.DMG_NAME }}" "${VERSIONED}"
          gh release create "${TAG}" "${VERSIONED}" \
            --title "${TAG}" \
            --generate-notes \
            --target "${{ github.event.workflow_run.head_sha }}" \
            --repo "${{ github.repository }}"
