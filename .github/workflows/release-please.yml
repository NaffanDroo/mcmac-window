name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  DMG_NAME: mcmac-window.dmg

jobs:

  # Build and test the DMG before release-please runs.
  # A broken build blocks the release entirely.
  build-dmg:
    name: Build & Test DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app
        run: ./build.sh

      - name: Create DMG
        run: ./scripts/make_dmg.sh

      - name: Test DMG
        run: ./scripts/test_dmg.sh

      - name: Store DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: ${{ env.DMG_NAME }}
          retention-days: 1

  # Creates a draft GitHub Release (draft: true in release-please-config.json).
  # Only runs once build-dmg passes.
  release-please:
    name: Release Please
    needs: build-dmg
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Get Token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.get_workflow_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Downloads the pre-built DMG, attaches it to the draft release,
  # then publishes the release. The release only goes live once the
  # artifact is attached — satisfying the immutable release guarantee.
  attach-and-publish:
    name: Attach DMG & Publish Release
    needs: [build-dmg, release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Attach DMG to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSIONED="mcmac-window-${TAG}.dmg"
          mv "${{ env.DMG_NAME }}" "${VERSIONED}"
          gh release upload "${TAG}" "${VERSIONED}" \
            --repo "${{ github.repository }}"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
