name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  DMG_NAME: mcmac-window.dmg

jobs:

  # Creates a draft GitHub Release (draft: true in release-please-config.json).
  # Only runs when the CI workflow completed successfully — a broken build
  # blocks the release entirely without duplicating the macOS build step.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Get Token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.get_workflow_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Downloads the CI-built DMG (uploaded by ci.yml on main pushes), attaches
  # it to the draft release, then publishes the release. The release only goes
  # live once the artifact is attached — satisfying the immutable release guarantee.
  attach-and-publish:
    name: Attach DMG & Publish Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: dmg
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach DMG to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSIONED="mcmac-window-${TAG}.dmg"
          mv "${{ env.DMG_NAME }}" "${VERSIONED}"
          gh release upload "${TAG}" "${VERSIONED}" \
            --repo "${{ github.repository }}"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
