name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: ./build.sh

      - name: Build (warnings as errors)
        # A second compile pass with -warnings-as-errors ensures no warnings
        # sneak into the codebase. Kept separate so the plain build artifact
        # above is always produced even if this check is later adjusted.
        run: ./build.sh --warnings-as-errors

      - name: Test
        run: ./test.sh
        # Geometry tests run fully. WindowMover integration tests require
        # Accessibility permission; they skip gracefully in headless CI
        # via XCTSkip and do not fail the suite.

      - name: Create DMG
        run: ./scripts/make_dmg.sh

      - name: Test DMG
        run: ./scripts/test_dmg.sh
        # Verifies file presence, icon positions (via Finder AppleScript),
        # volume kHasCustomIcon flag, background image darkness, and
        # kHasCustomIcon flag on the .dmg file itself.
        # Runs fully on macos-15 which provides a GUI session with Finder.

      - name: Create zip
        run: ditto -c -k --keepParent --rsrc mcmac-window.dmg mcmac-window.zip
        # ditto with --rsrc embeds the resource fork so the DMG file icon
        # (set by make_dmg.sh step 7) survives extraction on macOS via
        # Archive Utility. This mirrors the release workflow packaging step.
