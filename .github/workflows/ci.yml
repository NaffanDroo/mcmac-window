name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: ./build.sh

      - name: Test
        run: ./test.sh
        # Geometry tests run fully. WindowMover integration tests require a
        # real screen and Accessibility permission; they skip gracefully in
        # headless CI via `try skip(...)` and do not fail the suite.
