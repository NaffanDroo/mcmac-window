name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: ./build.sh

      - name: Build (warnings as errors)
        # A second compile pass with -warnings-as-errors ensures no warnings
        # sneak into the codebase. Kept separate so the plain build artifact
        # above is always produced even if this check is later adjusted.
        run: ./build.sh --warnings-as-errors

      - name: Test
        run: ./test.sh
        # Geometry tests run fully. WindowMover integration tests require a
        # real screen and Accessibility permission; they skip gracefully in
        # headless CI via `try skip(...)` and do not fail the suite.

      - name: Create DMG
        run: ./scripts/make_dmg.sh

      - name: Test DMG
        run: ./scripts/test_dmg.sh
        # Verifies file presence, icon positions (via Finder AppleScript),
        # volume kHasCustomIcon flag, and background image darkness.
        # Runs fully on macos-15 which provides a GUI session with Finder.
